<div class="employee-details-header">

  <h2>

    Employee Details

  </h2>

  <div class="employee-selector">

    <label>

      Employee

    </label>

    <select
      [(ngModel)]="selectedEmployeeId"
      (change)="employeeChanged()">

      <option value="">

        Select Employee

      </option>

      @for(employee of employees; track employee.id){

        <option
          [value]="employee.id">

          {{ employee.employeeCode }}
          -
          {{ employee.firstName }}
          {{ employee.lastName }}

        </option>

      }

    </select>

  </div>

</div>

<hr>
