<div class="auth-container">
  <div class="auth-card">
    <h2>Forgot Password</h2>
    <p class="auth-subtitle">Enter your registered email address to receive a secure password reset link.</p>

    <div *ngIf="successMessage()" class="alert alert-success">
      {{ successMessage() }}
    </div>

    <div *ngIf="errorMessage()" class="alert alert-danger">
      {{ errorMessage() }}
    </div>

    <form [formGroup]="forgotForm" (ngSubmit)="submit()" *ngIf="!successMessage()">
      <div class="form-group mb-4">
        <label for="email">Email Address</label>
        <input 
          type="email" 
          id="email" 
          formControlName="email" 
          class="form-control" 
          placeholder="e.g. employee@company.com">
        <div *ngIf="forgotForm.get('email')?.touched && forgotForm.get('email')?.invalid" class="validation-error">
          Please enter a valid email address.
        </div>
      </div>

      <button 
        type="submit" 
        class="btn btn-primary w-100 mb-3" 
        [disabled]="loading()">
        {{ loading() ? 'Sending link...' : 'Send Reset Link' }}
      </button>
    </form>

    <div class="text-center mt-3">
      <a routerLink="/login" class="back-link">Back to Login</a>
    </div>
  </div>
</div>
